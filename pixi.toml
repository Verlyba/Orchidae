[project]
name = "orchiday"
version = "0.1.0"
description = "Cross-platform no-code platform for hierarchical robot control (LLM/VLM + LeRobot)"
channels = ["conda-forge", "pytorch"]
platforms = ["linux-64", "win-64", "osx-arm64"]

[dependencies]
# LeRobot >= 0.5 requires Python 3.12+ and PyTorch 2.7+
python = ">=3.12,<3.13"
pyside6 = ">=6.6.0"
opencv = ">=4.8.0"
pytorch = ">=2.7.0"
torchvision = ">=0.22.0"
pandas = "*"
pyarrow = "*"
pyserial = "*"

[pypi-dependencies]
httpx = ">=0.27.0"
fastapi = ">=0.110"
uvicorn = ">=0.29"
keyboard = "*"
lerobot = { version = ">=0.5.1", extras = ["feetech"] }

[tasks]
orchiday = "python -m orchiday.server"
orchiday-web = "python -m orchiday.server"

