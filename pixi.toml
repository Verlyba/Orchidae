[project]
name = "orchiday"
version = "0.1.0"
description = "Cross-platform no-code platform for hierarchical robot control (LLM/VLM + LeRobot)"
channels = ["conda-forge", "pytorch"]
platforms = ["linux-64", "win-64", "osx-arm64"]

[dependencies]
python = ">=3.10,<3.12"
pyside6 = ">=6.6.0"
opencv = ">=4.8.0"
pytorch = ">=2.2.0"
torchvision = ">=0.17.0"
pandas = "*"
pyarrow = "*"
pyserial = "*"

[pypi-dependencies]
httpx = ">=0.27.0"
lerobot = { git = "https://github.com/huggingface/lerobot.git" }

[tasks]
orchiday = "python -m orchiday.main"
